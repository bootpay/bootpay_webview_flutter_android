name: bootpay_webview_flutter_android
description: webview_flutter_android 를 국내 결제환경에 맞게 fork 떠서 관리하는 프로젝트 입니다.
repository: https://github.com/bootpay/bootpay_webview_flutter_android
issue_tracker: https://github.com/bootpay/bootpay_webview_flutter_android/issues
version: 2.8.33

environment:
  sdk: ">=2.14.0 <3.0.0"
  flutter: ">=2.5.0"

flutter:
  plugin:
    implements: bootpay_webview_flutter
    platforms:
      android:
        package: kr.co.bootpay.webviewflutter
        pluginClass: WebViewFlutterPlugin

dependencies:
  flutter:
    sdk: flutter
  bootpay_webview_flutter_platform_interface: ^1.8.1

dev_dependencies:
  build_runner: ^2.1.4
  flutter_driver:
    sdk: flutter
  flutter_test:
    sdk: flutter
  mockito: ^5.1.0
  pedantic: ^1.10.0
  pigeon: 1.0.9
