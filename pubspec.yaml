name: bootpay_webview_flutter_android
description: A Flutter plugin that provides a WebView widget on Android.
repository: https://github.com/bootpay/bootpay_webview_flutter_android
issue_tracker: https://github.com/bootpay/bootpay_webview_flutter_android/issues
version: 3.17.0

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

flutter:
  plugin:
    implements: bootpay_webview_flutter
    platforms:
      android:
        package: kr.co.bootpay.webviewflutter
        pluginClass: WebViewFlutterPlugin
        dartPluginClass: BTAndroidWebViewPlatform

dependencies:
  flutter:
    sdk: flutter
  bootpay_webview_flutter_platform_interface: ^2.10.0

dev_dependencies:
  build_runner: ^2.1.4
  flutter_driver:
    sdk: flutter
  flutter_test:
    sdk: flutter
  mockito: 5.4.4
  pigeon: ^22.5.0



topics:
  - html
  - bootpay
  - payment
  - webview
  - webview-flutter